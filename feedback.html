<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LumenLabs — Feedback</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 24px; line-height: 1.45; }
    .card { max-width: 760px; margin: 0 auto; padding: 18px; border: 1px solid rgba(127,127,127,.35); border-radius: 12px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { margin: 8px 0; }
    label { display:block; font-weight: 600; margin-top: 12px; }
    input, textarea, select { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(127,127,127,.45); background: transparent; }
    textarea { min-height: 120px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btns { display:flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    button, a.btn { appearance: none; border: 1px solid rgba(127,127,127,.45); border-radius: 10px; padding: 10px 12px; text-decoration: none; color: inherit; background: rgba(127,127,127,.12); cursor: pointer; }
    button.primary, a.primary { border-color: rgba(80,160,255,.7); background: rgba(80,160,255,.18); }
    .hint { font-size: 12px; opacity: .8; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>
</head>
<body>
  <div class="card">
    <h1>LumenLabs — Feedback / Feature Request</h1>
    <p class="hint">No account. No analytics. If you choose to email, your email address will be visible to the developer.</p>

    <div class="row">
      <div>
        <label for="app">App</label>
        <input id="app" placeholder="e.g. PDFToolkit" />
      </div>
      <div>
        <label for="context">Context</label>
        <input id="context" placeholder="e.g. ComingSoon: Convert to Word" />
      </div>
    </div>

    <label for="message">What do you need?</label>
    <textarea id="message" placeholder="Describe your use case. What problem are you trying to solve? What would success look like?"></textarea>

    <div class="row">
      <div>
        <label for="priority">How urgent?</label>
        <select id="priority">
          <option value="nice">Nice to have</option>
          <option value="need">I need this soon</option>
          <option value="blocker">This blocks me</option>
        </select>
      </div>
      <div>
        <label for="pay">Would you pay for this?</label>
        <select id="pay">
          <option value="unsure">Not sure</option>
          <option value="yes">Yes (reasonable price)</option>
          <option value="no">No</option>
        </select>
      </div>
    </div>

    <div class="btns">
      <button class="primary" id="emailBtn">Email the developer</button>
      <button id="copyBtn">Copy template</button>
    </div>

    <p class="hint">Support email: <code>support@lumenlabs.top</code></p>
  </div>

<script>
(function() {
  const qs = new URLSearchParams(location.search);
  const app = document.getElementById('app');
  const context = document.getElementById('context');
  const message = document.getElementById('message');
  const priority = document.getElementById('priority');
  const pay = document.getElementById('pay');

  app.value = qs.get('app') || '';
  context.value = qs.get('ctx') || '';

  function buildBody() {
    const lines = [
      `App: ${app.value || '(unknown)'}`,
      `Context: ${context.value || '(none)'}`,
      `Urgency: ${priority.value}`,
      `Pay: ${pay.value}`,
      '',
      message.value || '(write your use case here)'
    ];
    return lines.join('\n');
  }

  document.getElementById('emailBtn').addEventListener('click', function() {
    const subject = `[${app.value || 'LumenLabs'}] Feature request`;
    const body = buildBody();
    const mailto = `mailto:support@lumenlabs.top?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    location.href = mailto;
  });

  document.getElementById('copyBtn').addEventListener('click', async function() {
    try {
      await navigator.clipboard.writeText(buildBody());
      alert('Copied. Paste it into an email or message.');
    } catch (e) {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = buildBody();
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      alert('Copied.');
    }
  });
})();
</script>
</body>
</html>
